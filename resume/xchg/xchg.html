<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xchg rax,rax</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    ::selection { background: #c8a96e; color: #111; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'IBM Plex Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: #ffffff;
      color: #111;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: #555; text-decoration: none; }
    a:hover { color: #111; text-decoration: underline; }

    /* ─── page header ─────────────────────────────────── */
    .page-header {
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 2px solid #111;
      display: flex;
      align-items: baseline;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .page-header .sub {
      font-size: 0.8rem;
      color: #888;
    }

    .page-header .back {
      margin-left: auto;
      font-size: 0.8rem;
      color: #888;
    }

    /* ─── index grid ──────────────────────────────────── */
    .idx {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 1rem 2rem;
      border-bottom: 1px solid #e0e0e0;
    }

    .idx a {
      font-size: 0.7rem;
      color: #aaa;
      width: 38px;
      text-align: center;
      padding: 2px 0;
      border: 1px solid #e8e8e8;
      border-radius: 2px;
      transition: background 0.1s, color 0.1s;
    }

    .idx a:hover {
      background: #111;
      color: #fff;
      text-decoration: none;
      border-color: #111;
    }

    .idx a.done {
      border-color: #999;
      color: #444;
    }

    /* ─── entries ─────────────────────────────────────── */
    .entries {
      padding: 0;
    }

    .entry {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid #e8e8e8;
      min-height: 200px;
    }

    .entry:last-child { border-bottom: none; }

    /* label column */
    .entry-label {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding: 1rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #bbb;
      border-right: 1px solid #e8e8e8;
      letter-spacing: 0.06em;
      user-select: none;
    }

    /* ─── iframe panel ────────────────────────────────── */
    .snip-panel {
      flex-shrink: 0;
      width: 310px;
      border-right: 1px solid #e8e8e8;
      background: #050505;
      overflow: hidden;
      position: relative;
      /* min-height ensures the panel stays visible even for short snippets */
      min-height: 200px;
    }

    /*
     * Crop strategy:
     *   iframe rendered at 620×540 px.
     *   scale(0.5) → visual 310×270.
     *   top: -14px skips the upper nav bar (~28px rendered → 14px visual).
     *   The snip content is vertically centered in the lower 95%, which at
     *   540px = 513px. The snippet index row (~4em ≈ 64px) + the code block
     *   below it fill this space. We show 200px of it (200px container).
     */
    .snip-frame {
      position: absolute;
      top: -14px;
      left: 0;
      width: 620px;
      height: 540px;
      border: none;
      transform: scale(0.5);
      transform-origin: 0 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* loading shimmer while iframe loads */
    .snip-panel::before {
      content: 'loading...';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #333;
      z-index: 0;
    }

    .snip-frame { z-index: 1; }

    /* ─── image panel ─────────────────────────────────── */
    .img-panel {
      flex-shrink: 0;
      width: 220px;
      border-right: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fafafa;
      position: relative;
    }

    .img-panel img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
    }

    .img-panel.empty::after {
      content: 'no image yet';
      font-size: 0.65rem;
      color: #ccc;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ─── notes panel ─────────────────────────────────── */
    .notes-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .notes-panel textarea {
      flex: 1;
      width: 100%;
      min-height: 200px;
      resize: none;
      border: none;
      outline: none;
      padding: 1rem 1.25rem;
      font-family: inherit;
      font-size: 0.82rem;
      line-height: 1.65;
      color: #111;
      background: #fff;
      caret-color: #111;
    }

    .notes-panel textarea::placeholder {
      color: #ccc;
    }

    .notes-panel textarea:focus {
      background: #fafff8;
    }

    /* ─── saved indicator ─────────────────────────────── */
    .save-indicator {
      height: 2px;
      background: transparent;
      transition: background 0.1s;
    }

    .save-indicator.flash {
      background: #6abf69;
    }

    /* ─── footer ──────────────────────────────────────── */
    .page-footer {
      padding: 2rem;
      border-top: 1px solid #e8e8e8;
      font-size: 0.75rem;
      color: #aaa;
    }

    .page-footer a { color: #888; }
    .page-footer a:hover { color: #111; }
    .page-footer .sep { margin: 0 0.5rem; color: #ddd; }

    /* ─── responsive ──────────────────────────────────── */
    @media (max-width: 900px) {
      .entry {
        flex-wrap: wrap;
      }

      .snip-panel {
        width: 100%;
        height: 200px;
        border-right: none;
        border-bottom: 1px solid #e8e8e8;
      }

      .img-panel {
        width: 50%;
        border-bottom: 1px solid #e8e8e8;
      }

      .notes-panel {
        width: 50%;
        border-bottom: 1px solid #e8e8e8;
      }
    }
  </style>
</head>
<body>

<header class="page-header">
  <h1>xchg rax,rax</h1>
  <span class="sub">0x00 – 0x40 · xorpd's assembly riddles</span>
  <a href="../" class="back">&larr; resume</a>
</header>

<nav class="idx" id="idx"></nav>

<div class="entries" id="entries"></div>

<footer class="page-footer">
  Notes auto-save to browser storage.
  <span class="sep">·</span>
  <a href="https://www.xorpd.net/pages/xchg_rax/snip_00.html" target="_blank" rel="noopener">xorpd.net</a>
  <span class="sep">·</span>
  <a href="../">resume</a>
  <span class="sep">·</span>
  <a href="https://agapebloom.com">agapebloom.com</a>
</footer>

<script>
  const TOTAL = 0x41; // 0x00 through 0x40 inclusive

  function hexId(n) {
    // two-digit lowercase hex for URLs
    return n.toString(16).padStart(2, '0');
  }

  function hexLabel(n) {
    // uppercase for display and file names
    return n.toString(16).padStart(2, '0').toUpperCase();
  }

  // ── build index ──────────────────────────────────────
  const idx = document.getElementById('idx');
  for (let i = 0; i < TOTAL; i++) {
    const H = hexLabel(i);
    const a = document.createElement('a');
    a.href = `#x${H}`;
    a.textContent = `0x${H}`;
    a.id = `idx_${H}`;
    idx.appendChild(a);
  }

  // ── build entries ────────────────────────────────────
  const entries = document.getElementById('entries');

  for (let i = 0; i < TOTAL; i++) {
    const h  = hexId(i);       // lowercase, for URL
    const H  = hexLabel(i);    // uppercase, for files/display
    const url = `https://www.xorpd.net/pages/xchg_rax/snip_${h}.html`;
    const key = `xchg_${H}`;

    const entry = document.createElement('div');
    entry.className = 'entry';
    entry.id = `x${H}`;

    entry.innerHTML = `
      <div class="entry-label">0x${H}</div>

      <div class="snip-panel">
        <iframe
          class="snip-frame"
          data-src="${url}"
          scrolling="no"
          frameborder="0"
          sandbox="allow-scripts allow-same-origin"
          title="xchg 0x${H}">
        </iframe>
      </div>

      <div class="img-panel empty" id="img_${H}">
        <img
          src="${H}.jpg"
          alt="notes ${H}"
          onerror="tryPng(this, '${H}')"
          onload="this.closest('.img-panel').classList.remove('empty')"
        >
      </div>

      <div class="notes-panel">
        <div class="save-indicator" id="si_${H}"></div>
        <textarea
          id="ta_${H}"
          placeholder="0x${H} — write your analysis here..."
          spellcheck="false"
        ></textarea>
      </div>
    `;

    entries.appendChild(entry);
  }

  // ── image fallback: try .png if .jpg 404s ────────────
  function tryPng(img, H) {
    if (!img.dataset.triedPng) {
      img.dataset.triedPng = '1';
      img.src = `${H}.png`;
    } else {
      img.style.display = 'none';
    }
  }

  // ── load notes (localStorage, fallback to .txt) ──────
  async function loadNotes(H) {
    const key = `xchg_${H}`;
    const ta  = document.getElementById(`ta_${H}`);
    if (!ta) return;

    const stored = localStorage.getItem(key);
    if (stored !== null) {
      ta.value = stored;
      if (stored.trim()) markDone(H);
      return;
    }

    // try fetching the .txt file (works when served over http)
    try {
      const res = await fetch(`${H}.txt`);
      if (res.ok) {
        const text = await res.text();
        ta.value = text;
        if (text.trim()) {
          localStorage.setItem(key, text);
          markDone(H);
        }
      }
    } catch (_) { /* not on a server or file missing — fine */ }
  }

  function markDone(H) {
    const link = document.getElementById(`idx_${H}`);
    if (link) link.classList.add('done');
  }

  // ── auto-save notes on input ─────────────────────────
  function wireNotes(H) {
    const ta = document.getElementById(`ta_${H}`);
    const si = document.getElementById(`si_${H}`);
    if (!ta) return;

    ta.addEventListener('input', () => {
      const key = `xchg_${H}`;
      localStorage.setItem(key, ta.value);
      if (ta.value.trim()) markDone(H);
      // flash save indicator
      si.classList.add('flash');
      clearTimeout(ta._st);
      ta._st = setTimeout(() => si.classList.remove('flash'), 600);
    });
  }

  // ── lazy-load iframes via IntersectionObserver ───────
  const iframeObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const iframe = e.target;
        if (!iframe.src || iframe.src === window.location.href) {
          iframe.src = iframe.dataset.src;
        }
        iframeObserver.unobserve(iframe);
      }
    });
  }, { rootMargin: '400px' });

  // ── init all entries ─────────────────────────────────
  for (let i = 0; i < TOTAL; i++) {
    const H = hexLabel(i);
    loadNotes(H);
    wireNotes(H);

    const iframe = document.querySelector(`#x${H} .snip-frame`);
    if (iframe) iframeObserver.observe(iframe);
  }
</script>
</body>
</html>
